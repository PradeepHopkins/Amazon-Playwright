name: Playwright Tests

# Trigger on pull requests only
on:
  pull_request:
    branches:
      - main
      - develop

# Cancel existing runs when a new run is triggered
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: [18.x]
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🔧 Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v3
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: 📦 Install dependencies with retry
        shell: bash
        run: |
          retry_count=0
          max_retries=1
          until [ $retry_count -ge $((max_retries + 1)) ]; do
            if npm ci; then
              echo "✅ Dependencies installed successfully"
              break
            else
              retry_count=$((retry_count + 1))
              if [ $retry_count -le $max_retries ]; then
                echo "⚠️  npm ci failed. Retrying... (Attempt $((retry_count + 1))/$((max_retries + 1)))"
                sleep 5
              else
                echo "❌ npm ci failed after $((max_retries + 1)) attempts"
                exit 1
              fi
            fi
          done

      - name: 🌐 Install Playwright browsers with retry
        shell: bash
        run: |
          retry_count=0
          max_retries=1
          until [ $retry_count -ge $((max_retries + 1)) ]; do
            if npx playwright install --with-deps chromium; then
              echo "✅ Playwright browsers installed successfully"
              break
            else
              retry_count=$((retry_count + 1))
              if [ $retry_count -le $max_retries ]; then
                echo "⚠️  Playwright install failed. Retrying... (Attempt $((retry_count + 1))/$((max_retries + 1)))"
                sleep 5
              else
                echo "❌ Playwright install failed after $((max_retries + 1)) attempts"
                exit 1
              fi
            fi
          done

      - name: 🧪 Run Playwright tests with retry
        shell: bash
        run: |
          retry_count=0
          max_retries=1
          until [ $retry_count -ge $((max_retries + 1)) ]; do
            if npx playwright test; then
              echo "✅ Tests passed successfully"
              break
            else
              retry_count=$((retry_count + 1))
              if [ $retry_count -le $max_retries ]; then
                echo "⚠️  Tests failed. Retrying... (Attempt $((retry_count + 1))/$((max_retries + 1)))"
                sleep 5
              else
                echo "❌ Tests failed after $((max_retries + 1)) attempts"
                exit 1
              fi
            fi
          done
        env:
          TEST_ENV: qa

      - name: 📊 Upload JUnit Test Results
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: junit-results
          path: results/junit.xml
          retention-days: 30

      - name: 📁 Upload Playwright HTML Report
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30

      - name: 📁 Upload Allure Results
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: allure-results
          path: allure-results/
          retention-days: 30

      - name: 📈 Publish Test Results
        if: always()
        uses: EnricoMi/publish-unit-test-result-action@v2
        with:
          files: results/junit.xml
          check_name: Playwright Test Results
          comment_mode: always
